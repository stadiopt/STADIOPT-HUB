<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de Vendas - STADIOPT</title>
    <style>
        :root {
            --wp-primary: #2563eb;
            --wp-primary-hover: #1d4ed8;
            --wp-success: #16a34a;
            --wp-danger: #dc2626;
            --wp-background: #f8fafc;
            --wp-text: #1e293b;
        }

        body {
            background-color: #cbd5e1;
            margin: 0;
            padding: 20px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        .wp-gestao-container {
            max-width: 1200px;
            margin: 0 auto;
            background-color: var(--wp-background);
            color: var(--wp-text);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
        }

        .wp-gestao-container h2 {
            text-align: center;
            color: #0f172a;
            margin-top: 10px;
            margin-bottom: 30px;
        }

        .wp-panel {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
            margin-bottom: 25px;
        }

        .wp-panel-title {
            margin-top: 0;
            margin-bottom: 15px;
            color: #334155;
            font-size: 16px;
            border-bottom: 1px solid #e2e8f0;
            padding-bottom: 8px;
            font-weight: bold;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 10px;
            margin-bottom: 10px;
            align-items: center;
        }

        .wp-form-group {
            display: flex;
            flex-direction: column;
            margin-bottom: 15px;
        }

        .wp-form-group label {
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 5px;
            color: #475569;
        }

        input, select {
            padding: 10px 12px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 14px;
            background: white;
            color: var(--wp-text);
            box-sizing: border-box;
            width: 100%;
        }

        /* Estilo específico para os selects dentro da tabela ficarem mais discretos e limpos */
        td select {
            padding: 6px 8px;
            font-size: 13px;
            font-weight: 600;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            width: auto;
            display: inline-block;
        }

        /* Cores dinâmicas para os selects da tabela baseados no estado */
        .sel-entregue { background-color: #dcfce7; color: #15803d; }
        .sel-encomendado { background-color: #e0f2fe; color: #0369a1; }
        .sel-porencomendar { background-color: #fef9c3; color: #a16207; }
        .sel-pago { background-color: #dcfce7; color: #15803d; }
        .sel-naopago { background-color: #fee2e2; color: #b91c1c; }

        .btn-add-product {
            background-color: #0284c7;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 20px;
            display: inline-block;
        }
        .btn-add-product:hover { background-color: #0369a1; }

        .btn-delete {
            background-color: var(--wp-danger);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            height: 40px;
        }

        .wp-btn-submit {
            background-color: var(--wp-primary);
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            font-size: 14px;
            width: 100%;
            display: block;
            text-align: center;
            margin-top: 15px;
        }
        .wp-btn-submit:hover { background-color: var(--wp-primary-hover); }

        .wp-filter-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: flex-end;
            background: #f1f5f9;
            padding: 15px;
            border-radius: 6px;
        }

        .wp-filter-group {
            display: flex;
            flex-direction: column;
            flex: 1;
            min-width: 150px;
        }

        .wp-filter-group label {
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 4px;
            color: #64748b;
        }

        .wp-table-container {
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
            overflow-x: auto;
            margin-top: 15px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            font-size: 14px;
        }

        th {
            background-color: #f8fafc;
            color: #475569;
            padding: 12px 16px;
            font-weight: 600;
            border-bottom: 2px solid #e2e8f0;
        }

        td {
            padding: 12px 16px;
            border-bottom: 1px solid #e2e8f0;
            color: var(--wp-text);
        }

        .wp-badge-tamanho { background: #e2e8f0; color: #1e293b; padding: 4px 8px; border-radius: 12px; font-size: 12px; font-weight: 600; }

        .wp-btn-delete-row {
            background-color: var(--wp-danger);
            color: white;
            padding: 5px 10px;
            font-size: 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .wp-btn-reset {
            background-color: #64748b;
            color: white;
            padding: 5px 10px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            float: right;
        }
    </style>
</head>
<body>

<div class="wp-gestao-container">
    <button class="wp-btn-reset" onclick="resetarDadosParaOOriginal()">⚠️ Restaurar Lista Original</button>
    <h2>STADIOPT - Gestão de Encomendas</h2>

    <div class="wp-panel">
        <div class="wp-panel-title">Nova Encomenda</div>
        <form id="orderForm">
            <div class="wp-form-group">
                <label for="wp_cliente">Nome do Cliente</label>
                <input type="text" id="wp_cliente" placeholder="Ex: Paulo" required>
            </div>

            <div id="productsContainer">
                <div class="form-grid product-row">
                    <input type="text" placeholder="Equipa" required class="p_team">
                    <input type="text" placeholder="Customização" class="p_custom">
                    <input type="text" placeholder="Tam." class="p_size">
                    <input type="number" value="1" min="1" class="p_qty">
                    <input type="number" value="15.00" step="0.01" class="p_price">
                    <button type="button" class="btn-delete" onclick="removeProductRow(this)" style="display:none;">X</button>
                </div>
            </div>

            <button type="button" class="btn-add-product" onclick="addProductRow()">+ Adicionar Outra Camisola</button>

            <div class="form-grid">
                <div style="display:flex; flex-direction:column;">
                    <label style="font-size:12px; font-weight:bold; color:#475569; margin-bottom:4px;">Estado Inicial</label>
                    <select id="wp_estado">
                        <option value="Encomendado">Encomendado</option>
                        <option value="Entregue">Entregue</option>
                        <option value="Por Encomendar">Por Encomendar</option>
                    </select>
                </div>
                <div style="display:flex; flex-direction:column;">
                    <label style="font-size:12px; font-weight:bold; color:#475569; margin-bottom:4px;">Pagamento Inicial</label>
                    <select id="wp_pagamento">
                        <option value="Não pago">Não pago</option>
                        <option value="Pago">Pago</option>
                    </select>
                </div>
            </div>

            <button type="submit" class="wp-btn-submit">Gravar Encomenda</button>
        </form>
    </div>

    <div class="wp-panel">
        <div class="wp-panel-title">Filtros de Pesquisa</div>
        <div class="wp-filter-bar">
            <div class="wp-filter-group" style="flex: 2;">
                <label for="wp_searchFilter">Pesquisar Cliente ou Equipa</label>
                <input type="text" id="wp_searchFilter" placeholder="Escreve para filtrar...">
            </div>
            <div class="wp-filter-group">
                <label for="wp_statusFilter">Estado</label>
                <select id="wp_statusFilter">
                    <option value="Todos">Todos</option>
                    <option value="Entregue">Entregue</option>
                    <option value="Encomendado">Encomendado</option>
                    <option value="Por Encomendar">Por Encomendar</option>
                </select>
            </div>
            <div class="wp-filter-group">
                <label for="wp_payFilter">Pagamento</label>
                <select id="wp_payFilter">
                    <option value="Todos">Todos</option>
                    <option value="Pago">Pago</option>
                    <option value="Não pago">Não pago</option>
                </select>
            </div>
        </div>
    </div>

    <div class="wp-table-container">
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Cliente</th>
                    <th>Equipa</th>
                    <th>Customização</th>
                    <th>Tam.</th>
                    <th>Qtd</th>
                    <th>Preço Un.</th>
                    <th>Estado (Altere aqui)</th>
                    <th>Pagamento (Altere aqui)</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="wp_tableBody"></tbody>
        </table>
    </div>
</div>

<script>
    const initialData = [
        { id: 1, cust: "Paulo", team: "Portugal Pantera Negra", custom: "", size: "L", qty: 1, price: 15, status: "Entregue", pay: "Pago" },
        { id: 1, cust: "Paulo", team: "Alemanha Preta", custom: "", size: "L", qty: 1, price: 15, status: "Entregue", pay: "Pago" },
        { id: 2, cust: "Barbara", team: "Marrocos", custom: "", size: "L", qty: 1, price: 15, status: "Entregue", pay: "Pago" },
        { id: 3, cust: "Rafael", team: "Portugal Pantera Negra", custom: "Ronaldo 7", size: "M", qty: 1, price: 15, status: "Entregue", pay: "Pago" },
        { id: 3, cust: "Rafael", team: "Sporting", custom: "Trincao 17", size: "M", qty: 1, price: 15, status: "Entregue", pay: "Pago" },
        { id: 4, cust: "Vinted", team: "Portugal Pantera Negra", custom: "", size: "L", qty: 1, price: 15, status: "Entregue", pay: "Pago" },
        { id: 5, cust: "FB", team: "Porto", custom: "", size: "XL", qty: 1, price: 15, status: "Entregue", pay: "Pago" },
        { id: 6, cust: "Vedat", team: "Portugal Pantera Negra", custom: "Narin 23", size: "M", qty: 1, price: 18, status: "Entregue", pay: "Pago" },
        { id: 6, cust: "Vedat", team: "Turquia", custom: "Vedat 10", size: "XL", qty: 1, price: 18, status: "Entregue", pay: "Pago" },
        { id: 7, cust: "OLX01", team: "Portugal Pantera Negra", custom: "RockNRoller 89", size: "M", qty: 1, price: 15, status: "Entregue", pay: "Pago" },
        { id: 7, cust: "OLX01", team: "Portugal", custom: "", size: "S", qty: 1, price: 15, status: "Entregue", pay: "Pago" },
        { id: 8, cust: "Gerson", team: "Portugal Pantera Negra", custom: "", size: "L", qty: 1, price: 15, status: "Entregue", pay: "Pago" },
        { id: 9, cust: "Paulo", team: "Portugal Pantera Negra", custom: "", size: "XL", qty: 1, price: 15, status: "Entregue", pay: "Pago" },
        { id: 9, cust: "Paulo", team: "Portugal Pantera Negra", custom: "", size: "XL", qty: 1, price: 15, status: "Entregue", pay: "Pago" },
        { id: 10, cust: "Tamara", team: "Argentina", custom: "", size: "S (W)", qty: 1, price: 15, status: "Encomendado", pay: "Pago" },
        { id: 11, cust: "Gerson", team: "Atletico Bilbao Verde", custom: "", size: "L", qty: 1, price: 15, status: "Encomendado", pay: "Não pago" },
        { id: 12, cust: "OLX02", team: "Japao Pokemon", custom: "", size: "M", qty: 1, price: 15, status: "Encomendado", pay: "Não pago" },
        { id: 12, cust: "OLX02", team: "Japao Pokemon", custom: "", size: "S", qty: 1, price: 15, status: "Encomendado", pay: "Não pago" },
        { id: 12, cust: "OLX02", team: "Japao Supra", custom: "", size: "M", qty: 1, price: 15, status: "Encomendado", pay: "Não pago" },
        { id: 12, cust: "OLX02", team: "Japao Slyline", custom: "", size: "M", qty: 1, price: 15, status: "Encomendado", pay: "Não pago" },
        { id: 13, cust: "Walter", team: "Brasil", custom: "Zezinho 89", size: "XL", qty: 1, price: 15, status: "Encomendado", pay: "Não pago" },
        { id: 13, cust: "Walter", team: "Brasil", custom: "Gabi G 9", size: "M (W)", qty: 1, price: 15, status: "Encomendado", pay: "Não pago" },
        { id: 14, cust: "Home", team: "Portugal 2a", custom: "", size: "XL", qty: 1, price: 15, status: "Encomendado", pay: "Pago" },
        { id: 14, cust: "Home", team: "Portugal Treino Azul", custom: "", size: "S", qty: 1, price: 15, status: "Encomendado", pay: "Pago" },
        { id: 14, cust: "Home", team: "Portugal", custom: "", size: "M (W)", qty: 1, price: 15, status: "Encomendado", pay: "Pago" },
        { id: 15, cust: "Barbara", team: "Marrocos 2a", custom: "", size: "L", qty: 1, price: 18, status: "Por Encomendar", pay: "Não pago" },
        { id: 16, cust: "Vinted", team: "Franca 2a", custom: "Zaïre-Emery", size: "M", qty: 1, price: 18, status: "Por Encomendar", pay: "Não pago" }
    ];

    let db = JSON.parse(localStorage.getItem('stadio_db_final')) || initialData;

    function save() {
        localStorage.setItem('stadio_db_final', JSON.stringify(db));
    }

    function addProductRow() {
        const container = document.getElementById('productsContainer');
        const div = document.createElement('div');
        div.className = 'form-grid product-row';
        div.innerHTML = `
            <input type="text" placeholder="Equipa" required class="p_team">
            <input type="text" placeholder="Customização" class="p_custom">
            <input type="text" placeholder="Tam." class="p_size">
            <input type="number" value="1" min="1" class="p_qty">
            <input type="number" value="15.00" step="0.01" class="p_price">
            <button type="button" class="btn-delete" onclick="removeProductRow(this)">X</button>
        `;
        container.appendChild(div);
        updateDeleteButtons();
    }

    function removeProductRow(button) {
        button.parentElement.remove();
        updateDeleteButtons();
    }

    function updateDeleteButtons() {
        const rows = document.querySelectorAll('.product-row');
        rows.forEach((row) => {
            const btn = row.querySelector('.btn-delete');
            if(btn) btn.style.display = rows.length === 1 ? 'none' : 'block';
        });
    }

    // NOVA FUNÇÃO: Atualiza o estado diretamente na lista quando o alteras na tabela
    function updateRowStatus(globalIndex, newStatus) {
        db[globalIndex].status = newStatus;
        save();
        refresh(); // Atualiza as cores instantaneamente
    }

    // NOVA FUNÇÃO: Atualiza o pagamento diretamente na lista quando o alteras na tabela
    function updateRowPay(globalIndex, newPay) {
        db[globalIndex].pay = newPay;
        save();
        refresh(); // Atualiza as cores instantaneamente
    }

    function refresh() {
        const tbody = document.getElementById('wp_tableBody');
        if(!tbody) return;
        tbody.innerHTML = '';

        const searchVal = document.getElementById('wp_searchFilter').value.toLowerCase();
        const statusVal = document.getElementById('wp_statusFilter').value;
        const payVal = document.getElementById('wp_payFilter').value;

        db.forEach((enc, index) => {
            const cliente = enc.cust || '—';
            const equipa = enc.team || '—';
            const customizacao = enc.custom || '—';
            const tamanho = enc.size || '—';
            const quantidade = enc.qty || 1;
            const preco = enc.price || 15;
            const estado = enc.status || 'Encomendado';
            const pagamento = enc.pay || 'Não pago';
            const displayId = enc.id || (index + 1);

            const matchesSearch = cliente.toLowerCase().includes(searchVal) || equipa.toLowerCase().includes(searchVal);
            const matchesStatus = (statusVal === "Todos") || (estado === statusVal);
            const matchesPay = (payVal === "Todos") || (pagamento.toLowerCase() === payVal.toLowerCase());

            if (matchesSearch && matchesStatus && matchesPay) {
                // Classes de cor dinâmicas para os dropdowns da tabela
                let payClass = pagamento.toLowerCase() === 'pago' ? 'sel-pago' : 'sel-naopago';
                let statusClass = 'sel-encomendado';
                if(estado === 'Entregue') statusClass = 'sel-entregue';
                if(estado === 'Por Encomendar') statusClass = 'sel-porencomendar';

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><strong>${displayId}</strong></td>
                    <td>${cliente}</td>
                    <td>${equipa}</td>
                    <td>${customizacao}</td>
                    <td><span class="wp-badge wp-badge-tamanho">${tamanho}</span></td>
                    <td>${quantidade}</td>
                    <td>${parseFloat(preco).toFixed(2)} €</td>
                    <td>
                        <select class="${statusClass}" onchange="updateRowStatus(${index}, this.value)">
                            <option value="Encomendado" ${estado === 'Encomendado' ? 'selected' : ''}>Encomendado</option>
                            <option value="Entregue" ${estado === 'Entregue' ? 'selected' : ''}>Entregue</option>
                            <option value="Por Encomendar" ${estado === 'Por Encomendar' ? 'selected' : ''}>Por Encomendar</option>
                        </select>
                    </td>
                    <td>
                        <select class="${payClass}" onchange="updateRowPay(${index}, this.value)">
                            <option value="Não pago" ${pagamento.toLowerCase() === 'não pago' ? 'selected' : ''}>Não pago</option>
                            <option value="Pago" ${pagamento.toLowerCase() === 'pago' ? 'selected' : ''}>Pago</option>
                        </select>
                    </td>
                    <td><button class="wp-btn-delete-row" onclick="deleteItem(${index})">Eliminar</button></td>
                `;
                tbody.appendChild(tr);
            }
        });
    }

    function deleteItem(index) {
        if(confirm("Eliminar este registo?")) {
            db.splice(index, 1);
            save();
            refresh();
        }
    }

    function resetarDadosParaOOriginal() {
        if(confirm("Tens a certeza que queres voltar à lista de fábrica original? Isto apagará novos registos feitos hoje.")) {
            db = [...initialData];
            save();
            refresh();
        }
    }

    document.getElementById('orderForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const inputCust = document.getElementById('wp_cliente').value.trim();
        const status = document.getElementById('wp_estado').value;
        const pay = document.getElementById('wp_pagamento').value;
        const rows = document.querySelectorAll('.product-row');

        const nextId = db.length > 0 ? Math.max(...db.map(i => i.id || 0)) + 1 : 1;

        rows.forEach(row => {
            db.push({
                id: nextId,
                cust: inputCust,
                team: row.querySelector('.p_team').value,
                custom: row.querySelector('.p_custom').value,
                size: row.querySelector('.p_size').value,
                qty: parseInt(row.querySelector('.p_qty').value) || 1,
                price: parseFloat(row.querySelector('.p_price').value) || 15.00,
                status: status,
                pay: pay
            });
        });

        this.reset();
        document.getElementById('productsContainer').innerHTML = `
            <div class="form-grid product-row">
                <input type="text" placeholder="Equipa" required class="p_team">
                <input type="text" placeholder="Customização" class="p_custom">
                <input type="text" placeholder="Tam." class="p_size">
                <input type="number" value="1" min="1" class="p_qty">
                <input type="number" value="15.00" step="0.01" class="p_price">
                <button type="button" class="btn-delete" onclick="removeProductRow(this)" style="display:none;">X</button>
            </div>
        `;
        save();
        refresh();
    });

    window.onload = function() {
        document.getElementById('wp_searchFilter').addEventListener('input', refresh);
        document.getElementById('wp_statusFilter').addEventListener('change', refresh);
        document.getElementById('wp_payFilter').addEventListener('change', refresh);
        refresh();
    };
</script>
</body>
</html>
