<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STΛDIO // Dashboard</title>
    <style>
        :root {
            --bg-main: #0a0c10;
            --bg-card: #121620;
            --bg-input: #1a202c;
            --border-color: #232d3f;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --brand-primary: #ffffff;
            --brand-accent: #38bdf8;
            
            --color-success: #10b981;
            --color-success-bg: rgba(16, 185, 129, 0.1);
            --color-warning: #f59e0b;
            --color-warning-bg: rgba(245, 158, 11, 0.1);
            --color-danger: #ef4444;
            --color-danger-bg: rgba(239, 68, 68, 0.1);
        }

        body {
            background-color: var(--bg-main);
            margin: 0;
            padding: 16px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: var(--text-main);
            -webkit-font-smoothing: antialiased;
        }

        .dashboard-container {
            max-width: 1100px;
            margin: 0 auto;
        }

        .dash-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-bottom: 30px;
            padding: 20px 0 10px 0;
            gap: 12px;
        }

        .logo-svg {
            width: 46px;
            height: 46px;
            fill: var(--brand-primary);
        }

        .dash-header h1 {
            font-size: 26px;
            font-weight: 900;
            margin: 0;
            letter-spacing: 4px;
            color: var(--brand-primary);
            text-align: center;
        }

        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 24px;
        }

        @media (min-width: 768px) {
            .metrics-grid {
                grid-template-columns: repeat(4, 1fr);
            }
        }

        .kpi-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2);
        }

        .kpi-title {
            font-size: 11px;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .kpi-value {
            font-size: 22px;
            font-weight: 800;
            color: var(--text-main);
        }

        .navigation-bar {
            display: flex;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            padding: 4px;
            border-radius: 8px;
            margin-bottom: 24px;
            gap: 4px;
        }

        .nav-tab {
            flex: 1;
            background: none;
            border: none;
            padding: 12px 4px;
            font-size: 13px;
            font-weight: 700;
            color: var(--text-muted);
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.2s ease;
            text-align: center;
            white-space: nowrap;
            letter-spacing: 0.5px;
        }

        .nav-tab.active {
            background: var(--bg-input);
            color: var(--brand-primary);
            border: 1px solid var(--border-color);
        }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .clean-panel {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2);
        }

        input, select {
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            padding: 12px 14px;
            border-radius: 6px;
            font-size: 14px;
            color: var(--text-main);
            width: 100%;
            outline: none;
        }

        input.inline-tracking-input {
            background: var(--bg-main);
            border: 1px solid var(--border-color);
            padding: 6px 10px;
            font-size: 12px;
            border-radius: 4px;
            color: var(--text-main);
            text-align: center;
            font-family: monospace;
        }

        .cards-layout {
            display: grid;
            grid-template-columns: 1fr;
            gap: 16px;
        }

        @media (min-width: 768px) {
            .cards-layout { grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); }
        }

        .order-item-card, .client-summary-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 18px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .card-top { display: flex; justify-content: space-between; align-items: center; }
        .client-name { font-size: 16px; font-weight: 700; }
        .badge-id { font-size: 11px; font-weight: 700; background: var(--bg-input); padding: 3px 8px; border-radius: 4px; border: 1px solid var(--border-color); }
        .card-details { display: flex; flex-direction: column; gap: 8px; font-size: 14px; border-top: 1px solid var(--border-color); border-bottom: 1px solid var(--border-color); padding: 12px 0; }
        .detail-line { display: flex; justify-content: space-between; align-items: center; }
        .detail-label { color: var(--text-muted); }
        .detail-value { font-weight: 600; }
        .customization-text { color: var(--brand-accent); }
        .card-selectors { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        
        .btn-action-delete { grid-column: span 2; background: none; border: 1px dashed var(--border-color); color: var(--text-muted); padding: 8px; border-radius: 6px; font-size: 12px; cursor: pointer; }
        
        .btn-submit-order { background: var(--brand-primary); color: var(--bg-main); border: none; padding: 16px; border-radius: 6px; font-weight: 800; cursor: pointer; width: 100%; text-transform: uppercase; }
        
        .loading-text { text-align: center; color: var(--text-muted); padding: 40px; }
    </style>
</head>
