<!DOCTYPE html><html lang="pt"><head>    <meta charset="UTF-8">    <meta name="viewport" content="width=device-width, initial-scale=1.0">    <title>STΛDIO - Gestão de Operações v13</title>    <style>        :root { --dark: #1a1a1a; --danger: #e74c3c; --success: #2ecc71; --warning: #f39c12; --info: #3498db; --bg: #f4f7f6; }        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 15px; color: #333; }        .container { max-width: 1400px; margin: auto; }        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 20px; }                .dashboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-bottom: 20px; }        .stat-card { padding: 20px; border-radius: 10px; color: white; text-align: center; }        .stat-card div { font-size: 1.8rem; font-weight: bold; margin-top: 5px; }        .bg-black { background: var(--dark); } .bg-red { background: var(--danger); } .bg-orange { background: var(--warning); } .bg-blue { background: var(--info); }
        .filter-bar { display: flex; gap: 8px; margin-bottom: 15px; flex-wrap: wrap; }        .filter-btn { padding: 10px 18px; border-radius: 25px; border: 1px solid #ddd; background: white; cursor: pointer; font-size: 0.85rem; font-weight: bold; transition: 0.2s; }        .filter-btn.active { background: var(--dark); color: white; border-color: var(--dark); }
        .table-wrap { overflow-x: auto; }        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }        th { text-align: left; padding: 12px; background: #f8f9fa; border-bottom: 2px solid #eee; color: #666; font-weight: 600; }        td { padding: 10px 12px; border-bottom: 1px solid #eee; }                .badge { padding: 6px 10px; border-radius: 6px; font-size: 0.7rem; font-weight: bold; cursor: pointer; border: none; transition: 0.2s; min-width: 110px; text-align: center; display: inline-block; }        .st-entregue { background: #d1f2eb; color: #16a085; }        .st-encomendado { background: #d6eaf8; color: #2e86c1; }        .st-por-encomendar { background: #fef9e7; color: #9a7d0a; border: 1px solid #f7dc6f; }        .pay-pago { background: #d4edda; color: #155724; }        .pay-falta { background: #f8d7da; color: #721c24; }
        .btn-delete { background: none; border: 1px solid #fab1a0; color: #e17055; padding: 4px 8px; border-radius: 4px; cursor: pointer; font-size: 0.7rem; }        .btn-delete:hover { background: #e17055; color: white; }
        .btn-edit { background: none; border: 1px solid #95a5a6; color: #7f8c8d; padding: 4px 8px; border-radius: 4px; cursor: pointer; font-size: 0.7rem; margin-right: 4px; }        .btn-edit:hover { background: #7f8c8d; color: white; }
        .btn-save { background: none; border: 1px solid #2ecc71; color: #27ae60; padding: 4px 8px; border-radius: 4px; cursor: pointer; font-size: 0.7rem; margin-right: 4px; }        .btn-save:hover { background: #2ecc71; color: white; }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; margin-bottom: 10px; }        input, select { padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 0.85rem; }        .btn-add { background: var(--dark); color: white; border: none; padding: 10px; border-radius: 8px; cursor: pointer; font-weight: bold; }        .btn-secondary { background: #7f8c8d; color: white; border: none; padding: 10px; border-radius: 8px; cursor: pointer; font-weight: bold; }        .inline-edit { width: 90%; padding: 4px; font-size: 0.8rem; border-radius: 4px; border: 1px solid #ccc; }    </style></head><body>
<div class="container">    <header style="margin-bottom: 20px;">        <h1 style="margin:0; font-size: 1.5rem;">STΛDIO - Gestão Hub</h1>    </header>
    <div class="dashboard">        <div class="stat-card bg-orange"><h3>A Encomendar</h3><div id="countToOrder">0</div></div>        <div class="stat-card bg-blue"><h3>Em Trânsito</h3><div id="countWaiting">0</div></div>        <div class="stat-card bg-red"><h3>Dívida Total</h3><div id="totalDebt">0.00 €</div></div>        <div class="stat-card bg-black"><h3>Total Artigos</h3><div id="countItems">0</div></div>    </div>

    <div class="card" style="border-top: 5px solid var(--warning);">        <h3 style="margin-top:0">🛒 Lista de Compras (Por Encomendar)</h3>        <div class="table-wrap">            <table>                <thead>                    <tr><th>Cliente</th><th>Equipa</th><th>Customização</th><th>Tam.</th><th>Qtd</th><th>Ações</th></tr>                </thead>                <tbody id="toOrderBody"></tbody>            </table>        </div>    </div>

    <div class="card">        <h3 style="margin-top:0">➕ Novo Pedido</h3>        <form id="orderForm">            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 10px; margin-bottom: 15px;">                <input type="text" id="f_cust" placeholder="Cliente" required>                <select id="f_status">                    <option value="Por Encomendar">Por Encomendar</option>                    <option value="Encomendado">Encomendado</option>                    <option value="Entregue">Entregue</option>                </select>                <select id="f_pay">                    <option value="Pago">Pago</option>                    <option value="Não pago">Não pago</option>                </select>            </div>                        <div id="productsContainer">                <div class="form-grid product-row">                    <input type="text" placeholder="Equipa" required class="p_team">                    <input type="text" placeholder="Customização" class="p_custom">                    <input type="text" placeholder="Tam." class="p_size">                    <input type="number" value="1" min="1" class="p_qty">                    <input type="number" value="15.00" step="0.01" class="p_price">                    <button type="button" class="btn-delete" onclick="removeProductRow(this)" style="display:none; height: 38px;">X</button>                </div>            </div>            <div style="margin-top: 15px; display: flex; gap: 10px;">                <button type="button" class="btn-secondary" onclick="addProductRow()">➕ Artigo</button>                <button type="submit" class="btn-add" style="flex: 1;">Registar Pedido(s)</button>            </div>        </form>    </div>

    <div class="filter-bar">        <button class="filter-btn active" onclick="setFilter('todos', this)">Todos</button>        <button class="filter-btn" onclick="setFilter('dividas', this)">Por Pagar 💸</button>        <button class="filter-btn" onclick="setFilter('por-encomendar', this)">Por Encomendar 📦</button>        <button class="filter-btn" onclick="setFilter('encomendado', this)">A caminho 🚚</button>        <button class="filter-btn" onclick="setFilter('entregue', this)">Entregue ✅</button>    </div>
    <div class="card">        <div class="table-wrap">            <table>                <thead>                    <tr>                        <th>ID</th>                        <th>Cliente</th>                        <th>Equipa</th>                        <th>Custom.</th>                        <th>Qtd</th>                        <th>Total</th>                        <th>Estado</th>                        <th>Pagamento</th>                        <th>Ações</th>                    </tr>                </thead>                <tbody id="mainBody"></tbody>            </table>        </div>    </div></div>
<script>    const initialData = [        { id: 1, cust: "Paulo", team: "Portugal Pantera Negra", custom: "", size: "L", qty: 1, price: 15, status: "Entregue", pay: "Pago" },        { id: 1, cust: "Paulo", team: "Alemanha Preta", custom: "", size: "L", qty: 1, price: 15, status: "Entregue", pay: "Pago" },        { id: 2, cust: "Barbara", team: "Marrocos", custom: "", size: "L", qty: 1, price: 15, status: "Entregue", pay: "Pago" },        { id: 3, cust: "Rafael", team: "Portugal Pantera Negra", custom: "Ronaldo 7", size: "M", qty: 1, price: 15, status: "Entregue", pay: "Pago" },        { id: 3, cust: "Rafael", team: "Sporting", custom: "Trincao 17", size: "M", qty: 1, price: 15, status: "Entregue", pay: "Pago" },        { id: 4, cust: "Vinted", team: "Portugal Pantera Negra", custom: "", size: "L", qty: 1, price: 15, status: "Entregue", pay: "Pago" },        { id: 5, cust: "FB", team: "Porto", custom: "", size: "XL", qty: 1, price: 15, status: "Entregue", pay: "Pago" },        { id: 6, cust: "Vedat", team: "Portugal Pantera Negra", custom: "Narin 23", size: "M", qty: 1, price: 18, status: "Entregue", pay: "Pago" },        { id: 6, cust: "Vedat", team: "Turquia", custom: "Vedat 10", size: "XL", qty: 1, price: 18, status: "Entregue", pay: "Pago" },        { id: 7, cust: "OLX01", team: "Portugal Pantera Negra", custom: "RockNRoller 89", size: "M", qty: 1, price: 15, status: "Entregue", pay: "Pago" },        { id: 7, cust: "OLX01", team: "Portugal", custom: "", size: "S", qty: 1, price: 15, status: "Entregue", pay: "Pago" },        { id: 8, cust: "Gerson", team: "Portugal Pantera Negra", custom: "", size: "L", qty: 1, price: 15, status: "Entregue", pay: "Pago" },        { id: 9, cust: "Paulo", team: "Portugal Pantera Negra", custom: "", size: "XL", qty: 1, price: 15, status: "Entregue", pay: "Pago" },        { id: 9, cust: "Paulo", team: "Portugal Pantera Negra", custom: "", size: "XL", qty: 1, price: 15, status: "Entregue", pay: "Pago" },        { id: 10, cust: "Tamara", team: "Argentina", custom: "", size: "S (W)", qty: 1, price: 15, status: "Encomendado", pay: "Pago" },        { id: 11, cust: "Gerson", team: "Atletico Bilbao Verde", custom: "", size: "L", qty: 1, price: 15, status: "Encomendado", pay: "Não pago" },        { id: 12, cust: "OLX02", team: "Japao Pokemon", custom: "", size: "M", qty: 1, price: 15, status: "Encomendado", pay: "Não pago" },        { id: 12, cust: "OLX02", team: "Japao Pokemon", custom: "", size: "S", qty: 1, price: 15, status: "Encomendado", pay: "Não pago" },        { id: 12, cust: "OLX02", team: "Japao Supra", custom: "", size: "M", qty: 1, price: 15, status: "Encomendado", pay: "Não pago" },        { id: 12, cust: "OLX02", team: "Japao Slyline", custom: "", size: "M", qty: 1, price: 15, status: "Encomendado", pay: "Não pago" },        { id: 13, cust: "Walter", team: "Brasil", custom: "Zezinho 89", size: "XL", qty: 1, price: 15, status: "Encomendado", pay: "Não pago" },        { id: 13, cust: "Walter", team: "Brasil", custom: "Gabi G 9", size: "M (W)", qty: 1, price: 15, status: "Encomendado", pay: "Não pago" },        { id: 14, cust: "Home", team: "Portugal 2a", custom: "", size: "XL", qty: 1, price: 15, status: "Encomendado", pay: "Pago" },        { id: 14, cust: "Home", team: "Portugal Treino Azul", custom: "", size: "S", qty: 1, price: 15, status: "Encomendado", pay: "Pago" },        { id: 14, cust: "Home", team: "Portugal", custom: "", size: "M (W)", qty: 1, price: 15, status: "Encomendado", pay: "Pago" },        { id: 15, cust: "Barbara", team: "Marrocos 2a", custom: "", size: "L", qty: 1, price: 18, status: "Por Encomendar", pay: "Não pago" },        { id: 16, cust: "Vinted", team: "Franca 2a", custom: "Zaïre-Emery", size: "M", qty: 1, price: 18, status: "Por Encomendar", pay: "Não pago" }    ];
    let db = JSON.parse(localStorage.getItem('stadio_db_final')) || initialData;    let filter = 'todos';    let editingIndex = null;

    function setFilter(f, btn) {        filter = f;        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));        btn.classList.add('active');        refresh();    }

    function toggleStatus(i) {        const flow = ["Por Encomendar", "Encomendado", "Entregue"];        db[i].status = flow[(flow.indexOf(db[i].status) + 1) % flow.length];        save();    }

    function togglePay(i) {        db[i].pay = db[i].pay === "Pago" ? "Não pago" : "Pago";        save();    }

    function deleteItem(i) {        if(confirm(`Remover encomenda de ${db[i].cust}?`)) { db.splice(i, 1); save(); }    }

    function editItem(i) {        editingIndex = i;        refresh();    }

    function saveEdit(i) {        const row = document.getElementById(`row-${i}`);        db[i].cust = row.querySelector('.edit-cust').value;        db[i].team = row.querySelector('.edit-team').value;        db[i].custom = row.querySelector('.edit-custom').value;        db[i].qty = parseInt(row.querySelector('.edit-qty').value) || 1;        db[i].price = parseFloat(row.querySelector('.edit-price').value) || 0;        editingIndex = null;        save();    }

    function cancelEdit() {        editingIndex = null;        refresh();    }

    function addProductRow() {        const container = document.getElementById('productsContainer');        const newRow = document.createElement('div');        newRow.className = 'form-grid product-row';        newRow.style.marginTop = '10px';        newRow.innerHTML = `            <input type="text" placeholder="Equipa" required class="p_team">            <input type="text" placeholder="Customização" class="p_custom">            <input type="text" placeholder="Tam." class="p_size">            <input type="number" value="1" min="1" class="p_qty">            <input type="number" value="15.00" step="0.01" class="p_price">            <button type="button" class="btn-delete" onclick="removeProductRow(this)" style="height: 38px;">X</button>        `;        container.appendChild(newRow);        updateRemoveButtons();    }

    function removeProductRow(btn) {        btn.parentElement.remove();        updateRemoveButtons();    }

    function updateRemoveButtons() {        const rows = document.querySelectorAll('.product-row');        rows.forEach((row, index) => {            const deleteBtn = row.querySelector('.btn-delete');            if(rows.length === 1) deleteBtn.style.display = 'none';            else deleteBtn.style.display = 'block';        });    }

    function save() {        localStorage.setItem('stadio_db_final', JSON.stringify(db));        refresh();    }

    function refresh() {        const main = document.getElementById('mainBody');        const toOrderBody = document.getElementById('toOrderBody');        main.innerHTML = ''; toOrderBody.innerHTML = '';                let debt = 0, toOrder = 0, waiting = 0, totalQty = 0;

        db.forEach((o, i) => {            totalQty += parseInt(o.qty);            if (o.pay === "Não pago") debt += (o.price * o.qty);            if (o.status === "Por Encomendar") toOrder++;            if (o.status === "Encomendado") waiting++;

            const stClass = o.status === 'Entregue' ? 'st-entregue' : (o.status === 'Encomendado' ? 'st-encomendado' : 'st-por-encomendar');            const payClass = o.pay === 'Pago' ? 'pay-pago' : 'pay-falta';

            if (o.status === "Por Encomendar") {                toOrderBody.innerHTML += `<tr>                    <td><strong>${o.cust}</strong></td><td>${o.team}</td><td>${o.custom || '-'}</td><td>${o.size}</td><td>${o.qty}</td>                    <td><button class="btn-delete" onclick="toggleStatus(${i})">➔ Encomendar</button> <button class="btn-delete" onclick="deleteItem(${i})">X</button></td>                </tr>`;            }

            if (filter === 'dividas' && o.pay === 'Pago') return;            if (filter === 'por-encomendar' && o.status !== 'Por Encomendar') return;            if (filter === 'encomendado' && o.status !== 'Encomendado') return;            if (filter === 'entregue' && o.status !== 'Entregue') return;

            if (editingIndex === i) {                main.insertAdjacentHTML('afterbegin', `<tr id="row-${i}">                    <td>${o.id}</td>                    <td><input type="text" class="inline-edit edit-cust" value="${o.cust}"></td>                    <td><input type="text" class="inline-edit edit-team" value="${o.team}"></td>                    <td><input type="text" class="inline-edit edit-custom" value="${o.custom}"></td>                    <td><input type="number" class="inline-edit edit-qty" value="${o.qty}" min="1" style="width:50px;"></td>                    <td><input type="number" class="inline-edit edit-price" value="${o.price}" step="0.01" style="width:60px;">€</td>                    <td><span class="badge ${stClass}">${o.status}</span></td>                    <td><span class="badge ${payClass}">${o.pay}</span></td>                    <td>                        <button class="btn-save" onclick="saveEdit(${i})">Gravar</button>                        <button class="btn-delete" onclick="cancelEdit()">X</button>                    </td>                </tr>`);            } else {                main.insertAdjacentHTML('afterbegin', `<tr>                    <td>${o.id}</td><td><strong>${o.cust}</strong></td><td>${o.team}</td><td>${o.custom || '-'}</td><td>${o.qty}</td><td>${(o.price * o.qty).toFixed(2)}€</td>                    <td><button class="badge ${stClass}" onclick="toggleStatus(${i})">${o.status}</button></td>                    <td><button class="badge ${payClass}" onclick="togglePay(${i})">${o.pay}</button></td>                    <td>                        <button class="btn-edit" onclick="editItem(${i})">Editar</button>                        <button class="btn-delete" onclick="deleteItem(${i})">Eliminar</button>                    </td>                </tr>`);            }        });

        document.getElementById('countToOrder').innerText = toOrder;        document.getElementById('countWaiting').innerText = waiting;        document.getElementById('totalDebt').innerText = debt.toFixed(2) + " €";        document.getElementById('countItems').innerText = totalQty;    }

    document.getElementById('orderForm').addEventListener('submit', function(e) {        e.preventDefault();        const inputCust = document.getElementById('f_cust').value.trim();        const status = document.getElementById('f_status').value;        const pay = document.getElementById('f_pay').value;                const existingMatch = db.find(x => x.cust.toLowerCase() === inputCust.toLowerCase());        let nextId = existingMatch ? existingMatch.id : (db.length > 0 ? Math.max(...db.map(x => x.id)) + 1 : 1);                const productRows = document.querySelectorAll('.product-row');                productRows.forEach(row => {            db.push({                id: nextId,                 cust: inputCust,                team: row.querySelector('.p_team').value,                 custom: row.querySelector('.p_custom').value,                size: row.querySelector('.p_size').value,                 qty: parseInt(row.querySelector('.p_qty').value) || 1,                price: parseFloat(row.querySelector('.p_price').value) || 0,                status: status,                 pay: pay            });        });

        this.reset();        document.getElementById('productsContainer').innerHTML = `            <div class="form-grid product-row">                <input type="text" placeholder="Equipa" required class="p_team">                <input type="text" placeholder="Customização" class="p_custom">                <input type="text" placeholder="Tam." class="p_size">                <input type="number" value="1" min="1" class="p_qty">                <input type="number" value="15.00" step="0.01" class="p_price">                <button type="button" class="btn-delete" onclick="removeProductRow(this)" style="display:none; height: 38px;">X</button>            </div>        `;        save();    });

    refresh();</script></body></html>
