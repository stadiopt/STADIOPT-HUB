<style>
    :root {
        --wp-primary: #2563eb;
        --wp-primary-hover: #1d4ed8;
        --wp-success: #16a34a;
        --wp-danger: #dc2626;
        --wp-background: #f8fafc;
        --wp-text: #1e293b;
    }

    .wp-gestao-container {
        max-width: 100%;
        margin: 0 auto;
        background-color: var(--wp-background);
        color: var(--wp-text);
        padding: 20px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen-Sans, Ubuntu, Cantarell, "Helvetica Neue", sans-serif;
    }

    .wp-gestao-container h2 {
        text-align: center;
        color: #0f172a;
        margin-bottom: 30px;
    }

    .wp-panel {
        background: white;
        padding: 20px;
        border-radius: 8px;
        box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        margin-bottom: 25px;
    }

    .wp-panel-title {
        margin-top: 0;
        margin-bottom: 15px;
        color: #334155;
        font-size: 16px;
        border-bottom: 1px solid #e2e8f0;
        padding-bottom: 8px;
        font-weight: bold;
    }

    .wp-form-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 15px;
        margin-bottom: 15px;
    }

    .wp-form-group {
        display: flex;
        flex-direction: column;
    }

    .wp-form-group label {
        font-size: 13px;
        font-weight: 600;
        margin-bottom: 5px;
        color: #475569;
    }

    .wp-form-group input, .wp-form-group select {
        padding: 8px 12px;
        border: 1px solid #cbd5e1;
        border-radius: 6px;
        font-size: 14px;
        background: white;
        color: var(--wp-text);
        height: auto;
    }

    .wp-btn-submit {
        background-color: var(--wp-primary) !important;
        color: white !important;
        padding: 12px 24px;
        border: none;
        border-radius: 6px;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.2s;
        font-size: 14px;
        width: 100%;
        display: block;
        text-align: center;
        margin-bottom: 10px;
    }

    .wp-btn-submit:hover { background-color: var(--wp-primary-hover) !important; }

    .wp-btn-clear {
        background-color: #64748b;
        color: white;
        padding: 6px 12px;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-size: 11px;
        float: right;
        margin-top: -5px;
    }
    .wp-btn-clear:hover { background-color: #475569; }

    .wp-filter-bar {
        display: flex;
        flex-wrap: wrap;
        gap: 15px;
        align-items: flex-end;
        background: #f1f5f9;
        padding: 15px;
        border-radius: 6px;
    }

    .wp-filter-group {
        display: flex;
        flex-direction: column;
        flex: 1;
        min-width: 150px;
    }

    .wp-filter-group label {
        font-size: 12px;
        font-weight: 600;
        margin-bottom: 4px;
        color: #64748b;
    }

    .wp-filter-group input, .wp-filter-group select {
        padding: 6px 10px;
        border: 1px solid #cbd5e1;
        border-radius: 6px;
        font-size: 13px;
        background: white;
    }

    .wp-table-container {
        background: white;
        border-radius: 8px;
        box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        overflow-x: auto;
        margin-top: 15px;
    }

    .wp-gestao-container table {
        width: 100%;
        border-collapse: collapse;
        text-align: left;
        font-size: 14px;
        margin: 0;
    }

    .wp-gestao-container th {
        background-color: #f8fafc;
        color: #475569;
        padding: 12px 16px;
        font-weight: 600;
        border-bottom: 2px solid #e2e8f0;
    }

    .wp-gestao-container td {
        padding: 12px 16px;
        border-bottom: 1px solid #e2e8f0;
        color: var(--wp-text);
    }

    .wp-badge {
        padding: 4px 8px;
        border-radius: 12px;
        font-size: 12px;
        font-weight: 600;
        display: inline-block;
        line-height: 1.2;
    }

    .wp-badge-tamanho { background: #e2e8f0; color: #1e293b; }
    .wp-badge-mulher { background: #fce7f3; color: #9d174d; }
    .wp-badge-crianca { background: #ffe4e6; color: #9f1239; }

    .wp-badge-entregue { background: #dcfce7; color: #15803d; }
    .wp-badge-pendente { background: #fef9c3; color: #a16207; }
    .wp-badge-pago { background: #dcfce7; color: #15803d; }
    .wp-badge-naopago { background: #fee2e2; color: #b91c1c; }
    .wp-badge-sinal { background: #e0f2fe; color: #0369a1; }

    .wp-btn-delete {
        background-color: var(--wp-danger);
        color: white;
        padding: 5px 10px;
        font-size: 12px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
    }
    .wp-btn-delete:hover { background-color: #b91c1c; }
</style>

<div class="wp-gestao-container">
    <button class="wp-btn-clear" onclick="wpForcarLimpeza()">⚙️ Limpar Memória Antiga</button>
    <h2>Gestão de Vendas - Camisolas</h2>

    <div class="wp-panel">
        <div class="wp-panel-title">Nova Encomenda</div>
        <div class="wp-form-grid">
            <div class="wp-form-group">
                <label for="wp_cliente">Cliente</label>
                <input type="text" id="wp_cliente" placeholder="Ex: Paulo">
            </div>
            <div class="wp-form-group">
                <label for="wp_artigo">Artigo / Equipamento</label>
                <input type="text" id="wp_artigo" placeholder="Ex: Portugal Pantera Negra">
            </div>
            <div class="wp-form-group">
                <label for="wp_tamanho">Tamanho / Categoria</label>
                <select id="wp_tamanho">
                    <optgroup label="Adulto (Homem / Unissexo)">
                        <option value="S">S</option>
                        <option value="M">M</option>
                        <option value="L" selected>L</option>
                        <option value="XL">XL</option>
                        <option value="XXL">XXL</option>
                    </optgroup>
                    <optgroup label="Mulher (Corte Feminino)">
                        <option value="Mulher S">Mulher S</option>
                        <option value="Mulher M">Mulher M</option>
                        <option value="Mulher L">Mulher L</option>
                        <option value="Mulher XL">Mulher XL</option>
                    </optgroup>
                    <optgroup label="Criança (Por Idade)">
                        <option value="Criança 3/4 anos">Criança 3/4 anos</option>
                        <option value="Criança 5/6 anos">Criança 5/6 anos</option>
                        <option value="Criança 7/8 anos">Criança 7/8 anos</option>
                        <option value="Criança 9/10 anos">Criança 9/10 anos</option>
                        <option value="Criança 11/12 anos">Criança 11/12 anos</option>
                        <option value="Criança 13/14 anos">Criança 13/14 anos</option>
                    </optgroup>
                </select>
            </div>
            <div class="wp-form-grid" style="grid-template-columns: 1fr 1fr; margin:0; gap:10px;">
                <div class="wp-form-group">
                    <label for="wp_preco">Preço (€)</label>
                    <input type="number" id="wp_preco" step="0.01" placeholder="15.00">
                </div>
                <div class="wp-form-group">
                    <label for="wp_faltaPagar">Falta Pagar (€)</label>
                    <input type="number" id="wp_faltaPagar" step="0.01" placeholder="0.00">
                </div>
            </div>
        </div>

        <div class="wp-form-grid">
            <div class="wp-form-group">
                <label for="wp_data">Data</label>
                <input type="date" id="wp_data">
            </div>
            <div class="wp-form-group">
                <label for="wp_estado">Estado</label>
                <select id="wp_estado">
                    <option value="Pendente">Pendente</option>
                    <option value="Entregue">Entregue</option>
                </select>
            </div>
            <div class="wp-form-group">
                <label for="wp_pagamento">Pagamento</label>
                <select id="wp_pagamento">
                    <option value="Pago">Pago</option>
                    <option value="Não Pago">Não Pago</option>
                    <option value="Sinal">Sinal</option>
                </select>
            </div>
            <div class="wp-form-group">
                <label for="wp_tracking">Tracking / Registo</label>
                <input type="text" id="wp_tracking" placeholder="Ex: —">
            </div>
        </div>
        <button type="button" class="wp-btn-submit" onclick="wpAdicionarNovaEncomenda()">Adicionar Encomenda</button>
    </div>

    <div class="wp-panel">
        <div class="wp-panel-title">Filtros e Pesquisa rápida</div>
        <div class="wp-filter-bar">
            <div class="wp-filter-group" style="flex: 2;">
                <label for="wp_searchFilter">Pesquisar por Cliente ou Artigo</label>
                <input type="text" id="wp_searchFilter" placeholder="Escreve o nome ou camisola para filtrar...">
            </div>
            <div class="wp-filter-group">
                <label for="wp_statusFilter">Estado de Entrega</label>
                <select id="wp_statusFilter">
                    <option value="Todos">Todos</option>
                    <option value="Pendente">Pendente</option>
                    <option value="Entregue">Entregue</option>
                </select>
            </div>
            <div class="wp-filter-group">
                <label for="wp_payFilter">Estado de Pagamento</label>
                <select id="wp_payFilter">
                    <option value="Todos">Todos</option>
                    <option value="Pago">Pago</option>
                    <option value="Não Pago">Não Pago</option>
                    <option value="Sinal">Sinal</option>
                </select>
            </div>
        </div>
    </div>

    <div class="wp-table-container">
        <table>
            <thead>
                <tr>
                    <th>Nº</th>
                    <th>Cliente</th>
                    <th>Artigo / Equipamento</th>
                    <th>Tamanho</th>
                    <th>Preço</th>
                    <th>Data</th>
                    <th>Estado</th>
                    <th>Pagamento</th>
                    <th>Falta Pagar</th>
                    <th>Tracking / Registo</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="wp_tableBody"></tbody>
        </table>
    </div>
</div>

<script>
    const wpRegistosIniciais = [
        { cliente: "Paulo", artigo: "Portugal Pantera Negra", tamanho: "L", preco: "15.00", data: "—", estado: "Entregue", pagamento: "Pago", faltaPagar: "0.00", tracking: "—" },
        { cliente: "Carlos Santos", artigo: "Benfica Alternativa", tamanho: "M", preco: "18.00", data: "2026-05-10", estado: "Pendente", pagamento: "Não Pago", faltaPagar: "18.00", tracking: "—" },
        { cliente: "Ana Silva", artigo: "Sporting Principal", tamanho: "Mulher M", preco: "20.00", data: "2026-05-15", estado: "Entregue", pagamento: "Pago", faltaPagar: "0.00", tracking: "RF987654321PT" }
    ];

    let wpEncomendas = JSON.parse(localStorage.getItem('wpEncomendasCamisolas'));
    
    if (!wpEncomendas || !Array.isArray(wpEncomendas) || wpEncomendas.length === 0) {
        wpEncomendas = wpRegistosIniciais;
        wpGravarDados();
    }

    function wpGravarDados() {
        localStorage.setItem('wpEncomendasCamisolas', JSON.stringify(wpEncomendas));
    }

    function wpRenderTable() {
        const tbody = document.getElementById('wp_tableBody');
        if(!tbody) return;
        tbody.innerHTML = '';

        const searchVal = document.getElementById('wp_searchFilter').value.toLowerCase();
        const statusVal = document.getElementById('wp_statusFilter').value;
        const payVal = document.getElementById('wp_payFilter').value;

        wpEncomendas.forEach((enc, index) => {
            const matchesSearch = (enc.cliente || '').toLowerCase().includes(searchVal) || (enc.artigo || '').toLowerCase().includes(searchVal);
            const matchesStatus = (statusVal === "Todos") || (enc.estado === statusVal);
            const matchesPay = (payVal === "Todos") || (enc.pagamento === payVal);

            if (matchesSearch && matchesStatus && matchesPay) {
                let dataFormatada = enc.data ? enc.data : "—";
                if(enc.data && enc.data !== "—" && enc.data.includes('-')) {
                    const parts = enc.data.split('-');
                    dataFormatada = `${parts[2]}/${parts[1]}/${parts[0]}`;
                }

                let payClass = 'wp-badge-naopago';
                if(enc.pagamento === 'Pago') payClass = 'wp-badge-pago';
                if(enc.pagamento === 'Sinal') payClass = 'wp-badge-sinal';

                let tamanhoClass = 'wp-badge-tamanho';
                if(enc.tamanho && enc.tamanho.includes('Mulher')) tamanhoClass = 'wp-badge-mulher';
                if(enc.tamanho && enc.tamanho.includes('Criança')) tamanhoClass = 'wp-badge-crianca';

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><strong>${index + 1}</strong></td>
                    <td>${enc.cliente || '—'}</td>
                    <td>${enc.artigo || '—'}</td>
                    <td><span class="wp-badge ${tamanhoClass}">${enc.tamanho || 'L'}</span></td>
                    <td>${parseFloat(enc.preco || 0).toFixed(2)} €</td>
                    <td>${dataFormatada}</td>
                    <td><span class="wp-badge ${enc.estado === 'Entregue' ? 'wp-badge-entregue' : 'wp-badge-pendente'}">${enc.estado || 'Pendente'}</span></td>
                    <td><span class="wp-badge ${payClass}">${enc.pagamento || 'Não Pago'}</span></td>
                    <td>${parseFloat(enc.faltaPagar || 0).toFixed(2)} €</td>
                    <td>${enc.tracking || "—"}</td>
                    <td><button class="wp-btn-delete" onclick="wpEliminarEncomenda(${index})">Eliminar</button></td>
                `;
                tbody.appendChild(tr);
            }
        });
    }

    function wpAdicionarNovaEncomenda() {
        const c = document.getElementById('wp_cliente').value.trim() || "Sem Nome";
        const a = document.getElementById('wp_artigo').value.trim() || "Sem Artigo";
        const t = document.getElementById('wp_tamanho').value;
        const p = document.getElementById('wp_preco').value || "0";
        const d = document.getElementById('wp_data').value || "—";
        const e = document.getElementById('wp_estado').value;
        const pag = document.getElementById('wp_pagamento').value;
        const f = document.getElementById('wp_faltaPagar').value || "0";
        const trk = document.getElementById('wp_tracking').value || "—";

        wpEncomendas.push({ cliente: c, artigo: a, tamanho: t, preco: p, data: d, estado: e, pagamento: pag, faltaPagar: f, tracking: trk });
        wpGravarDados();
        wpRenderTable();
        
        document.getElementById('wp_cliente').value = "";
        document.getElementById('wp_artigo').value = "";
        document.getElementById('wp_preco').value = "";
        document.getElementById('wp_faltaPagar').value = "";
        document.getElementById('wp_data').value = "";
        document.getElementById('wp_tracking').value = "";
    }

    function wpForcarLimpeza() {
        if(confirm("Deseja mesmo limpar a memória antiga do navegador?")) {
            localStorage.removeItem('wpEncomendasCamisolas');
            wpEncomendas = wpRegistosIniciais;
            wpGravarDados();
            wpRenderTable();
            alert("Memória limpa!");
        }
    }

    function wpEliminarEncomenda(index) {
        if(confirm("Eliminar esta encomenda?")) {
            wpEncomendas.splice(index, 1);
            wpGravarDados();
            wpRenderTable();
        }
    }

    // Configurar escutas de eventos com segurança após o carregamento completo da página
    document.addEventListener("DOMContentLoaded", function() {
        const searchInput = document.getElementById('wp_searchFilter');
        const statusSelect = document.getElementById('wp_statusFilter');
        const paySelect = document.getElementById('wp_payFilter');

        if(searchInput) searchInput.addEventListener('input', wpRenderTable);
        if(statusSelect) statusSelect.addEventListener('change', wpRenderTable);
        if(paySelect) paySelect.addEventListener('change', wpRenderTable);

        wpRenderTable();
    });
</script>
