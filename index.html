<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de Vendas - STADIOPT</title>
    <style>
        :root {
            --wp-primary: #2563eb;
            --wp-primary-hover: #1d4ed8;
            --wp-success: #16a34a;
            --wp-danger: #dc2626;
            --wp-background: #f8fafc;
            --wp-text: #1e293b;
        }

        body {
            background-color: #cbd5e1;
            margin: 0;
            padding: 20px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        .wp-gestao-container {
            max-width: 1200px;
            margin: 0 auto;
            background-color: var(--wp-background);
            color: var(--wp-text);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
        }

        .wp-gestao-container h2 {
            text-align: center;
            color: #0f172a;
            margin-top: 10px;
            margin-bottom: 30px;
        }

        .wp-panel {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
            margin-bottom: 25px;
        }

        .wp-panel-title {
            margin-top: 0;
            margin-bottom: 15px;
            color: #334155;
            font-size: 16px;
            border-bottom: 1px solid #e2e8f0;
            padding-bottom: 8px;
            font-weight: bold;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 10px;
            margin-bottom: 10px;
            align-items: center;
        }

        .wp-form-group {
            display: flex;
            flex-direction: column;
            margin-bottom: 15px;
        }

        .wp-form-group label {
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 5px;
            color: #475569;
        }

        input, select {
            padding: 10px 12px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 14px;
            background: white;
            color: var(--wp-text);
            box-sizing: border-box;
            width: 100%;
        }

        .btn-add-product {
            background-color: #0284c7;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 20px;
            display: inline-block;
        }
        .btn-add-product:hover { background-color: #0369a1; }

        .btn-delete {
            background-color: var(--wp-danger);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            height: 40px;
        }

        .wp-btn-submit {
            background-color: var(--wp-primary);
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            font-size: 14px;
            width: 100%;
            display: block;
            text-align: center;
            margin-top: 15px;
        }
        .wp-btn-submit:hover { background-color: var(--wp-primary-hover); }

        .wp-filter-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: flex-end;
            background: #f1f5f9;
            padding: 15px;
            border-radius: 6px;
        }

        .wp-filter-group {
            display: flex;
            flex-direction: column;
            flex: 1;
            min-width: 150px;
        }

        .wp-filter-group label {
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 4px;
            color: #64748b;
        }

        .wp-table-container {
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
            overflow-x: auto;
            margin-top: 15px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            font-size: 14px;
        }

        th {
            background-color: #f8fafc;
            color: #475569;
            padding: 12px 16px;
            font-weight: 600;
            border-bottom: 2px solid #e2e8f0;
        }

        td {
            padding: 12px 16px;
            border-bottom: 1px solid #e2e8f0;
            color: var(--wp-text);
        }

        .wp-badge {
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            display: inline-block;
        }

        .wp-badge-tamanho { background: #e2e8f0; color: #1e293b; }
        .wp-badge-entregue { background: #dcfce7; color: #15803d; }
        .wp-badge-pendente { background: #fef9c3; color: #a16207; }
        .wp-badge-pago { background: #dcfce7; color: #15803d; }
        .wp-badge-naopago { background: #fee2e2; color: #b91c1c; }
        .wp-badge-sinal { background: #e0f2fe; color: #0369a1; }

        .wp-btn-delete-row {
            background-color: var(--wp-danger);
            color: white;
            padding: 5px 10px;
            font-size: 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="wp-gestao-container">
    <h2>STADIOPT - Gestão de Encomendas</h2>

    <!-- FORMULÁRIO -->
    <div class="wp-panel">
        <div class="wp-panel-title">Nova Encomenda</div>
        <form id="orderForm">
            <div class="wp-form-group">
                <label for="wp_cliente">Nome do Cliente</label>
                <input type="text" id="wp_cliente" placeholder="Ex: Paulo" required>
            </div>

            <div id="productsContainer">
                <div class="form-grid product-row">
                    <input type="text" placeholder="Equipa" required class="p_team">
                    <input type="text" placeholder="Customização" class="p_custom">
                    <input type="text" placeholder="Tam." class="p_size">
                    <input type="number" value="1" min="1" class="p_qty">
                    <input type="number" value="15.00" step="0.01" class="p_price">
                    <button type="button" class="btn-delete" onclick="removeProductRow(this)" style="display:none;">X</button>
                </div>
            </div>

            <button type="button" class="btn-add-product" onclick="addProductRow()">+ Adicionar Outra Camisola</button>

            <div class="form-grid">
                <div style="display:flex; flex-direction:column;">
                    <label style="font-size:12px; font-weight:bold; color:#475569; margin-bottom:4px;">Estado</label>
                    <select id="wp_estado">
                        <option value="Pendente">Pendente</option>
                        <option value="Entregue">Entregue</option>
                    </select>
                </div>
                <div style="display:flex; flex-direction:column;">
                    <label style="font-size:12px; font-weight:bold; color:#475569; margin-bottom:4px;">Pagamento</label>
                    <select id="wp_pagamento">
                        <option value="Pago">Pago</option>
                        <option value="Não Pago">Não Pago</option>
                        <option value="Sinal">Sinal</option>
                    </select>
                </div>
            </div>

            <button type="submit" class="wp-btn-submit">Gravar Encomenda</button>
        </form>
    </div>

    <!-- FILTROS -->
    <div class="wp-panel">
        <div class="wp-panel-title">Filtros de Pesquisa</div>
        <div class="wp-filter-bar">
            <div class="wp-filter-group" style="flex: 2;">
                <label for="wp_searchFilter">Pesquisar Cliente ou Equipa</label>
                <input type="text" id="wp_searchFilter" placeholder="Escreve para filtrar...">
            </div>
            <div class="wp-filter-group">
                <label for="wp_statusFilter">Entrega</label>
                <select id="wp_statusFilter">
                    <option value="Todos">Todos</option>
                    <option value="Pendente">Pendente</option>
                    <option value="Entregue">Entregue</option>
                </select>
            </div>
            <div class="wp-filter-group">
                <label for="wp_payFilter">Pagamento</label>
                <select id="wp_payFilter">
                    <option value="Todos">Todos</option>
                    <option value="Pago">Pago</option>
                    <option value="Não Pago">Não Pago</option>
                    <option value="Sinal">Sinal</option>
                </select>
            </div>
        </div>
    </div>

    <!-- TABELA -->
    <div class="wp-table-container">
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Cliente</th>
                    <th>Equipa</th>
                    <th>Customização</th>
                    <th>Tam.</th>
                    <th>Qtd</th>
                    <th>Preço Un.</th>
                    <th>Estado</th>
                    <th>Pagamento</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="wp_tableBody"></tbody>
        </table>
    </div>
</div>

<script>
    // AQUI ESTÁ O SEGREDO: Ele tenta ler 'db' ou 'stadiopt_db' para resgatar os teus dados antigos!
    let Db = JSON.parse(localStorage.getItem('db')) || JSON.parse(localStorage.getItem('stadiopt_db')) || [];

    function save() {
        // Guarda em ambos os nomes para nunca mais perderes nada
        localStorage.setItem('db', JSON.stringify(Db));
        localStorage.setItem('stadiopt_db', JSON.stringify(Db));
    }

    function addProductRow() {
        const container = document.getElementById('productsContainer');
        const div = document.createElement('div');
        div.className = 'form-grid product-row';
        div.innerHTML = `
            <input type="text" placeholder="Equipa" required class="p_team">
            <input type="text" placeholder="Customização" class="p_custom">
            <input type="text" placeholder="Tam." class="p_size">
            <input type="number" value="1" min="1" class="p_qty">
            <input type="number" value="15.00" step="0.01" class="p_price">
            <button type="button" class="btn-delete" onclick="removeProductRow(this)">X</button>
        `;
        container.appendChild(div);
        updateDeleteButtons();
    }

    function removeProductRow(button) {
        button.parentElement.remove();
        updateDeleteButtons();
    }

    function updateDeleteButtons() {
        const rows = document.querySelectorAll('.product-row');
        rows.forEach((row, index) => {
            const btn = row.querySelector('.btn-delete');
            if(btn) btn.style.display = rows.length === 1 ? 'none' : 'block';
        });
    }

    function refresh() {
        const tbody = document.getElementById('wp_tableBody');
        if(!tbody) return;
        tbody.innerHTML = '';

        const searchVal = document.getElementById('wp_searchFilter').value.toLowerCase();
        const statusVal = document.getElementById('wp_statusFilter').value;
        const payVal = document.getElementById('wp_payFilter').value;

        Db.forEach((enc) => {
            const matchesSearch = (enc.cust || '').toLowerCase().includes(searchVal) || (enc.team || '').toLowerCase().includes(searchVal);
            const matchesStatus = (statusVal === "Todos") || (enc.status === statusVal);
            const matchesPay = (payVal === "Todos") || (enc.pay === payVal);

            if (matchesSearch && matchesStatus && matchesPay) {
                let payClass = 'wp-badge-naopago';
                if(enc.pay === 'Pago') payClass = 'wp-badge-pago';
                if(enc.pay === 'Sinal') payClass = 'wp-badge-sinal';

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><strong>${enc.id}</strong></td>
                    <td>${enc.cust || '—'}</td>
                    <td>${enc.team || '—'}</td>
                    <td>${enc.custom || '—'}</td>
                    <td><span class="wp-badge wp-badge-tamanho">${enc.size || 'L'}</span></td>
                    <td>${enc.qty || 1}</td>
                    <td>${parseFloat(enc.price || 0).toFixed(2)} €</td>
                    <td><span class="wp-badge ${enc.status === 'Entregue' ? 'wp-badge-entregue' : 'wp-badge-pendente'}">${enc.status || 'Pendente'}</span></td>
                    <td><span class="wp-badge ${payClass}">${enc.pay || 'Não Pago'}</span></td>
                    <td><button class="wp-btn-delete-row" onclick="deleteItem(${enc.id})">Eliminar</button></td>
                `;
                tbody.appendChild(tr);
            }
        });
    }

    function deleteItem(id) {
        if(confirm("Eliminar este registo?")) {
            Db = Db.filter(item => item.id !== id);
            save();
            refresh();
        }
    }

    document.getElementById('orderForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const inputCust = document.getElementById('wp_cliente').value.trim();
        const status = document.getElementById('wp_estado').value;
        const pay = document.getElementById('wp_pagamento').value;
        const rows = document.querySelectorAll('.product-row');

        rows.forEach(row => {
            const nextId = Db.length > 0 ? Math.max(...Db.map(i => i.id)) + 1 : 1;
            Db.push({
                id: nextId,
                cust: inputCust,
                team: row.querySelector('.p_team').value,
                custom: row.querySelector('.p_custom').value,
                size: row.querySelector('.p_size').value,
                qty: parseInt(row.querySelector('.p_qty').value) || 1,
                price: parseFloat(row.querySelector('.p_price').value) || 15.00,
                status: status,
                pay: pay
            });
        });

        this.reset();
        document.getElementById('productsContainer').innerHTML = `
            <div class="form-grid product-row">
                <input type="text" placeholder="Equipa" required class="p_team">
                <input type="text" placeholder="Customização" class="p_custom">
                <input type="text" placeholder="Tam." class="p_size">
                <input type="number" value="1" min="1" class="p_qty">
                <input type="number" value="15.00" step="0.01" class="p_price">
                <button type="button" class="btn-delete" onclick="removeProductRow(this)" style="display:none;">X</button>
            </div>
        `;
        save();
        refresh();
    });

    window.onload = function() {
        document.getElementById('wp_searchFilter').addEventListener('input', refresh);
        document.getElementById('wp_statusFilter').addEventListener('change', refresh);
        document.getElementById('wp_payFilter').addEventListener('change', refresh);
        refresh();
    };
</script>
</body>
</html>
